        - generic [ref=e145]:
          - generic [ref=e146]:
            - paragraph [ref=e147]: 要件定義から受入まで工程を一方向に直列に並べ、各工程末の完了判定(レビュー・審査)を通過してから次工程へ進む開発プロセスモデル
            - blockquote [ref=e148]:
              - paragraph [ref=e149]:
                - strong [ref=e150]: ひとことで言うと
                - text: ": 工程を一列に並べ、各工程の終わりに「できたか」の審査を通ってから次へ進む進め方。日本では審査が契約の区切り(検収)を兼ねる"
            - heading "全体マップ(L1)" [level=2] [ref=e151]
            - paragraph [ref=e152]: 各フェーズをクリックすると、フェーズ内のワークフロー(L2)へ移動します。
            - generic [ref=e153]: "graph LR ph0[\"要件定義\"] ph1[\"基本設計(外部設計)\"] ph0 -->|\"G1 要件定義完了判定\"| ph1 ph2[\"詳細設計(内部設計)\"] ph1 -->|\"G2 基本設計完了判定\"| ph2 ph3[\"製造(コーディング)\"] ph2 -->|\"G3 詳細設計完了判定\"| ph3 ph4[\"単体テスト(UT)\"] ph3 --> ph4 ph5[\"結合テスト(IT)\"] ph4 -->|\"G4 製造・単体テスト完了判定\"| ph5 ph6[\"総合テスト(ST)\"] ph5 -->|\"G5 結合テスト完了判定\"| ph6 ph7[\"受入・リリース\"] ph6 -->|\"G6 総合テスト完了判定 / G7 出荷判定\"| ph7 gEnd{\"G8 検収(受入判定)\"} ph7 --> gEnd click ph0 \"/process-compass/processes/waterfall/requirements/\" \"要件定義の詳細へ\" click ph1 \"/process-compass/processes/waterfall/basic-design/\" \"基本設計(外部設計)の詳細へ\" click ph2 \"/process-compass/processes/waterfall/detailed-design/\" \"詳細設計(内部設計)の詳細へ\" click ph3 \"/process-compass/processes/waterfall/coding/\" \"製造(コーディング)の詳細へ\" click ph4 \"/process-compass/processes/waterfall/unit-test/\" \"単体テスト(UT)の詳細へ\" click ph5 \"/process-compass/processes/waterfall/integration-test/\" \"結合テスト(IT)の詳細へ\" click ph6 \"/process-compass/processes/waterfall/system-test/\" \"総合テスト(ST)の詳細へ\" click ph7 \"/process-compass/processes/waterfall/acceptance/\" \"受入・リリースの詳細へ\""
            - heading "目的と成果" [level=2] [ref=e154]
            - paragraph [ref=e155]:
              - strong [ref=e156]: 目的(purpose)
              - text: ": 大規模・多人数・受発注構造の開発において、工程と成果物を直列に固定し、各工程末の完了判定で品質と契約責任を確定させながら計画どおりにシステムを完成させる"
            - paragraph [ref=e157]:
              - strong [ref=e158]: 成果(outcomes)
              - text: ":"
            - list [ref=e159]:
              - listitem [ref=e160]: 各工程の承認済み成果物一式(要件定義書〜テスト成績書)が揃っている
              - listitem [ref=e161]: 工程ごとの完了判定・検収の記録が残っている
              - listitem [ref=e162]: 検収合格により契約上の債務履行が確定している
              - listitem [ref=e163]: 保守へ引き継ぎ可能な文書群が残っている
            - paragraph [ref=e164]:
              - strong [ref=e165]: 原典
              - text: ": 通説上の原典は Royce 1970。ただし原典は逐次一発勝負を「リスキーで失敗を招く」と警告し、反復(Do it twice)と継続的顧客関与を推奨していた。「waterfall」の語は Bell & Thayer 1976 が初出、制度化は DOD-STD-2167(1985)"
            - paragraph [ref=e166]:
              - strong [ref=e167]: ISO/IEC/IEEE 12207 対応
              - text: ": 主に「テクニカル(要件定義〜検証・妥当性確認を中心にカバー。日本では共通フレーム(SLCP-JCF)が語彙基盤)」プロセス群をカバー"
