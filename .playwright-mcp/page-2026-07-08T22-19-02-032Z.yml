            - paragraph [ref=f10e110]: This document establishes governing principles and guidelines for developing plain language documents. The guidelines detail how the principles are interpreted and applied.
            - paragraph [ref=f10e111]: This document is for anybody who creates or helps create documents. The widest use of plain language is for documents that are intended for the general public. However, it is also applicable, for example, to technical writing, legislative drafting or using controlled languages.
            - paragraph [ref=f10e112]: This document applies to most, if not all, written languages, but it provides examples only in English.
            - paragraph [ref=f10e113]: "While this document covers the essential elements of plain language, it has some intentional limits, as follows:"
            - paragraph [ref=f10e114]:
              - generic [ref=f10e115]: — It does not cover all types of communication. It applies only to printed or digital information that is primarily in the form of text.
