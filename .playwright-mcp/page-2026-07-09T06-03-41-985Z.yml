            - heading "建前と実運用(日本の現場)" [level=2] [ref=e341]
            - list [ref=e342]:
              - listitem [ref=e343]: 共通の病理は「構造の輸入・中核の非輸入」。イベント・ロール名という観察可能な形だけを移植し、経験主義・自己組織化・単一責任という中核を移植し損ねている
              - listitem [ref=e344]: 海外のアンチパターンは「権力の誤用」「動機の欠如」が主因だが、日本ではこれに制度化された合議・多段決裁が加わり、単一PO崩壊とロール肥大が「個人の失敗」でなく「組織構造の既定値」として現れる
              - listitem [ref=e345]: 健全なハイブリッドか無自覚なアンチパターンかの判別軸は、(a)境界線が明示設計されているか、(b)反復の学習が上流・リリースに還流するか、(c)単一の価値判断者が実在するか。この3軸で診断できる
            - heading "フェーズ一覧(L2 へ)" [level=2] [ref=e346]
