                - text: — 反復しない前段。アジャイルチームが関与する前に範囲・予算・スケジュールを固定する
              - listitem [ref=e350]:
                - link "Scrum(中段=反復)" [ref=e351] [cursor=pointer]:
                  - /url: /process-compass/processes/hybrid/scrum/
                - text: — 開発チーム内部はスクラム。ただしバックログの優先順位は上流の WF 成果物に縛られ、PO の裁量が実質ない場合が多い
              - listitem [ref=e352]:
                - link "Fall(後段=ウォーターフォール)" [ref=e353] [cursor=pointer]:
                  - /url: /process-compass/processes/hybrid/fall/
                - text: — 反復しない後段。統合テスト・受入テスト・リリース承認を WF の直列ゲートで通す
