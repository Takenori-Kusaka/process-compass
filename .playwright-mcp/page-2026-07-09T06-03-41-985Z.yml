            - generic [ref=e163]: "graph LR ph0[\"Water(前段=ウォーターフォール)\"] ph1[\"Scrum(中段=反復)\"] ph0 -->|\"要件承認ゲート(前段WF)\"| ph1 ph2[\"Fall(後段=ウォーターフォール)\"] ph1 -->|\"スプリントレビューの検収化\"| ph2 gEnd{\"リリース承認ゲート(後段WF)\"} ph2 --> gEnd click ph0 \"/process-compass/processes/hybrid/water/\" \"Water(前段=ウォーターフォール)の詳細へ\" click ph1 \"/process-compass/processes/hybrid/scrum/\" \"Scrum(中段=反復)の詳細へ\" click ph2 \"/process-compass/processes/hybrid/fall/\" \"Fall(後段=ウォーターフォール)の詳細へ\""
            - heading "目的と成果" [level=2] [ref=e164]
