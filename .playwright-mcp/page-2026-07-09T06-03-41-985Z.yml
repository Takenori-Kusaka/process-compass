        - generic [ref=e155]:
          - generic [ref=e156]:
            - paragraph [ref=e157]: スクラム/アジャイルを名乗りながら、原典の設計から逸脱し価値を生まない運用形態の総称。日本企業で実際に起きている「建前はスクラム、実態は混乱」という From の実態
            - blockquote [ref=e158]:
              - paragraph [ref=e159]:
                - strong [ref=e160]: ひとことで言うと
                - text: ": イベントやロール名という「形」だけを輸入し、経験主義・自己組織化・単一責任という「魂」を輸入し損ねた状態。日本ではこれに稟議・合議・品質ゲート文化が接ぎ木されて固有の形になる。ただしすべてが「悪」ではなく、境界を意識的に設計した過渡形なら有効な場合もある"
            - heading "全体マップ(L1)" [level=2] [ref=e161]
