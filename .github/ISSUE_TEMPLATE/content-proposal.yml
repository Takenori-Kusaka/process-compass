name: 📝 コンテンツ提案
description: 新しく扱ってほしいプロセス・観点・事例の提案
labels: [content-proposal]
body:
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 扱ってほしいプロセス、調査観点、実務での事例などをお書きください。
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 背景・理由
      description: なぜそれが重要だと考えるか(任意)
